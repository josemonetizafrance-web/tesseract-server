<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESSERACT - Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <img id="bouncing-logo" src="/dist/assets/logo.png" alt="TESSERACT">
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <img src="/dist/assets/tesseract-logo.svg" alt="TESSERACT" style="width:100%;height:auto;display:block;">
            </div>

            <p class="subtitle">SISTEMA OPERATIVO IA</p>
        </div>

        <div id="error-msg" class="message error" style="display: none;"></div>
        <div id="success-msg" class="message success" style="display: none;"></div>

        <form id="login-form" autocomplete="off">
            <div class="input-group">
                <label for="login-email">CORREO</label>
                <input type="email" id="login-email" placeholder="usuario@tesseract.com" required>
            </div>

            <div class="input-group">
                <label for="login-password">CONTRASEÑA</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
                <span class="hint">Debe terminar con *+</span>
            </div>

            <button type="submit" id="btn-do-login" class="btn-primary">
                INICIAR SESIÓN
            </button>
        </form>

        <div class="login-footer">
            <span id="login-version" class="version">v1.0.0</span>
            <span class="separator">|</span>
            <span class="copyright">2026 TESSERACT</span>
        </div>
    </div>

    <script src="/dist/modules/error-handler.js"></script>
    <script src="login.js"></script>
</body>
</html>
